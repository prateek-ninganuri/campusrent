<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CampusRent</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#F8FAFC;color:#0F172A;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Syne',sans-serif;line-height:1.2}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:'DM Sans',sans-serif;border:none;outline:none}
input,select,textarea{font-family:'DM Sans',sans-serif;outline:none}
img{display:block;width:100%}
:root{
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-l:#EFF6FF;
  --green:#22C55E;--green-d:#16A34A;
  --dark:#0F172A;--dark2:#1E293B;--dark3:#334155;
  --bg:#F8FAFC;--bg2:#F1F5F9;
  --t2:#475569;--t3:#94A3B8;
  --brd:#E2E8F0;
  --sh:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
  --sh2:0 8px 32px rgba(0,0,0,.12);
  --r:14px;--r2:8px;
}
#nav{position:fixed;top:0;left:0;right:0;z-index:999;height:62px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--brd);display:flex;align-items:center}
.nav-in{max-width:1280px;margin:0 auto;padding:0 24px;width:100%;display:flex;align-items:center;gap:8px}
.nav-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;display:flex;align-items:center;gap:8px;cursor:pointer}
.logo-box{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-txt span{color:var(--blue)}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
.nav-links button{padding:8px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--dark3);background:none;transition:background .15s,color .15s}
.nav-links button:hover{background:var(--bg2);color:var(--dark)}
.nav-links button.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.nav-cta{display:flex;gap:8px;margin-left:16px}
.btn-ghost{padding:8px 18px;border-radius:50px;border:1.5px solid var(--brd);background:#fff;font-size:14px;font-weight:500;color:var(--dark);transition:all .15s}
.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-blue{padding:8px 20px;border-radius:50px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;transition:all .15s}
.btn-blue:hover{background:var(--blue-d);transform:translateY(-1px)}
#app{padding-top:62px;min-height:100vh}
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--dark2);color:#fff;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:var(--sh2);transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
.container{max-width:1280px;margin:0 auto;padding:0 24px}
.sec{padding:72px 0}
.sec-tag{display:inline-block;background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}
.sec-title{font-size:clamp(24px,3vw,36px);font-weight:800;color:var(--dark)}
.sec-sub{font-size:16px;color:var(--t2);margin-top:8px}
.sec-hd{text-align:center;margin-bottom:44px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:22px}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.ic{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer}
.ic:hover{transform:translateY(-4px);box-shadow:var(--sh2)}
.ic-img{position:relative;aspect-ratio:4/3;overflow:hidden;background:var(--bg2)}
.ic-img img{height:100%;object-fit:cover;transition:transform .3s}
.ic:hover .ic-img img{transform:scale(1.05)}
.ic-avail{position:absolute;top:10px;left:10px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:50px;text-transform:uppercase;letter-spacing:.5px}
.ic-unavail{background:#94A3B8}
.ic-fav{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer;transition:transform .15s;border:none}
.ic-fav:hover{transform:scale(1.12)}
.ic-body{padding:15px}
.ic-cat{font-size:10px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.ic-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--dark);margin-bottom:8px;line-height:1.3}
.ic-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ic-price{font-weight:700;font-size:15px}
.ic-price span{font-size:12px;color:var(--t2);font-weight:400}
.ic-star{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--t2)}
.star{color:#F59E0B}
.ic-loc{font-size:12px;color:var(--t3);margin-bottom:13px}
.ic-btn{width:100%;padding:9px;background:var(--bg2);color:var(--blue);border-radius:var(--r2);font-size:13px;font-weight:600;transition:background .15s,color .15s}
.ic-btn:hover{background:var(--blue);color:#fff}
.hero{background:linear-gradient(135deg,#0F172A 0%,#1E3A6E 55%,#2563EB 100%);padding:90px 24px 72px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 60% 40%,rgba(37,99,235,.3) 0%,transparent 60%)}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:13px;font-weight:500;padding:6px 14px;border-radius:50px;margin-bottom:24px;position:relative}
.hero-badge b{color:var(--green)}
.hero h1{font-size:clamp(32px,5vw,60px);font-weight:800;color:#fff;margin-bottom:18px;max-width:760px;margin-left:auto;margin-right:auto;letter-spacing:-1px;position:relative}
.hero h1 em{color:#93C5FD;font-style:normal}
.hero p{font-size:17px;color:rgba(255,255,255,.72);max-width:500px;margin:0 auto 36px;position:relative}
.hero-search{max-width:580px;margin:0 auto 28px;display:flex;background:#fff;border-radius:50px;box-shadow:0 8px 32px rgba(0,0,0,.3);overflow:hidden;padding:5px 5px 5px 20px;position:relative}
.hero-search input{flex:1;border:none;font-size:15px;color:var(--dark);background:transparent;min-width:0}
.hero-search input::placeholder{color:var(--t3)}
.hero-search button{background:var(--blue);color:#fff;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;white-space:nowrap;transition:background .15s}
.hero-search button:hover{background:var(--blue-d)}
.hero-ctas{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;position:relative}
.btn-green{padding:12px 28px;border-radius:50px;background:var(--green);color:#fff;font-size:15px;font-weight:600;transition:all .15s}
.btn-green:hover{background:var(--green-d);transform:translateY(-2px)}
.btn-outline-w{padding:12px 28px;border-radius:50px;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:15px;font-weight:500;transition:all .15s}
.btn-outline-w:hover{background:rgba(255,255,255,.22)}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:56px;flex-wrap:wrap;position:relative}
.hs{text-align:center}
.hs strong{display:block;font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff}
.hs span{font-size:12px;color:rgba(255,255,255,.55)}
.how{background:var(--dark);padding:72px 0}
.how .sec-tag{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)}
.how .sec-title{color:#fff}
.how .sec-sub{color:rgba(255,255,255,.45)}
.how-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:24px}
.how-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:32px;text-align:center;position:relative}
.how-num{position:absolute;top:-13px;left:50%;transform:translateX(-50%);width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif}
.how-ico{width:54px;height:54px;border-radius:14px;background:rgba(37,99,235,.25);margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-size:26px}
.how-card h3{font-size:17px;font-weight:700;color:#fff;margin-bottom:10px}
.how-card p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.75}
.cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px}
.cat{background:#fff;border-radius:var(--r);padding:24px 14px;text-align:center;box-shadow:var(--sh);cursor:pointer;transition:all .2s;border:2px solid transparent}
.cat:hover{border-color:var(--blue);transform:translateY(-3px)}
.cat-ico{font-size:32px;margin-bottom:10px}
.cat-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--dark)}
.cat-cnt{font-size:11px;color:var(--t3);margin-top:3px}
.testi-wrap{background:var(--bg2);padding:72px 0}
.testi-card{background:#fff;border-radius:var(--r);padding:26px;box-shadow:var(--sh)}
.tc-stars{color:#F59E0B;font-size:14px;margin-bottom:12px}
.tc-text{font-size:14px;color:var(--t2);line-height:1.8;margin-bottom:18px;font-style:italic}
.tc-user{display:flex;align-items:center;gap:10px}
.tc-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:14px}
.tc-name{font-weight:600;font-size:13px;color:var(--dark)}
.tc-uni{font-size:11px;color:var(--t3)}
footer{background:var(--dark);padding:56px 0 28px}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;margin-bottom:44px}
.f-brand p{font-size:13px;color:rgba(255,255,255,.45);line-height:1.8;margin-top:12px}
.f-col h4{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.f-col ul{list-style:none}
.f-col li{margin-bottom:8px}
.f-col a{font-size:13px;color:rgba(255,255,255,.45);transition:color .15s}
.f-col a:hover{color:#fff}
.f-bottom{border-top:1px solid rgba(255,255,255,.07);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.f-bottom p{font-size:12px;color:rgba(255,255,255,.35)}
.browse-wrap{max-width:1280px;margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:268px 1fr;gap:28px;align-items:start}
.fsidebar{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:22px;position:sticky;top:76px}
.fs-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:22px}
.fs-grp{margin-bottom:22px}
.fs-grp h4{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.fopt{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer}
.fopt input{accent-color:var(--blue);cursor:pointer}
.fopt label{font-size:13px;color:var(--t2);cursor:pointer}
.frange{width:100%;accent-color:var(--blue);margin-top:4px}
.frange-vals{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-top:3px}
.apply-btn{width:100%;padding:11px;background:var(--blue);color:#fff;border-radius:var(--r2);font-size:13px;font-weight:600;margin-top:6px;transition:background .15s}
.apply-btn:hover{background:var(--blue-d)}
.browse-topbar{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.b-search{flex:1;display:flex;min-width:200px;background:#fff;border:1.5px solid var(--brd);border-radius:50px;overflow:hidden;padding:5px 5px 5px 16px}
.b-search input{flex:1;border:none;font-size:14px;color:var(--dark);background:transparent}
.b-search button{background:var(--blue);color:#fff;padding:7px 18px;border-radius:50px;font-size:13px;font-weight:600}
.b-sort select{padding:9px 14px;border:1.5px solid var(--brd);border-radius:50px;font-size:13px;color:var(--dark);background:#fff;cursor:pointer}
.b-count{font-size:13px;color:var(--t2);white-space:nowrap}
.pag{display:flex;justify-content:center;gap:7px;margin-top:36px}
.pag-btn{width:34px;height:34px;border-radius:var(--r2);background:#fff;border:1.5px solid var(--brd);font-size:13px;font-weight:500;color:var(--dark);transition:all .15s}
.pag-btn:hover,.pag-btn.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.detail-wrap{max-width:1100px;margin:0 auto;padding:36px 24px;display:grid;grid-template-columns:1fr 340px;gap:36px;align-items:start}
.d-gallery{}
.d-main-img{aspect-ratio:16/10;border-radius:var(--r);overflow:hidden;background:var(--bg2)}
.d-main-img img{height:100%;object-fit:cover}
.d-thumbs{display:flex;gap:8px;margin-top:8px}
.d-thumb{width:70px;height:52px;border-radius:7px;overflow:hidden;cursor:pointer;border:2px solid transparent;flex-shrink:0;background:var(--bg2)}
.d-thumb img{height:100%;object-fit:cover}
.d-thumb.on{border-color:var(--blue)}
.d-info{margin-top:26px}
.d-toprow{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.d-cat{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:.5px}
.d-avail{background:#DCFCE7;color:#16A34A;font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px}
.d-title{font-size:26px;font-weight:800;color:var(--dark);margin-bottom:10px}
.d-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;font-size:13px;color:var(--t2)}
.d-owner{display:flex;align-items:center;gap:12px;background:var(--bg2);border-radius:var(--r2);padding:14px;margin-bottom:22px}
.o-av{width:42px;height:42px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:16px;background:linear-gradient(135deg,var(--blue),var(--blue-d))}
.o-info h4{font-size:14px;font-weight:700;color:var(--dark)}
.o-info p{font-size:12px;color:var(--t2)}
.d-desc h3{font-size:15px;font-weight:700;margin-bottom:8px}
.d-desc p{font-size:14px;color:var(--t2);line-height:1.8}
.bk-card{background:#fff;border-radius:var(--r);box-shadow:var(--sh2);padding:22px;border:1px solid var(--brd);position:sticky;top:76px}
.bk-price{font-size:26px;font-weight:800;color:var(--dark)}
.bk-price span{font-size:14px;font-weight:400;color:var(--t2)}
.bk-rate{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);margin:4px 0 18px}
.bk-fg{margin-bottom:13px}
.bk-fg label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:5px}
.bk-fg input{width:100%;padding:9px 12px;border:1.5px solid var(--brd);border-radius:var(--r2);font-size:13px;color:var(--dark);transition:border-color .15s}
.bk-fg input:focus{border-color:var(--blue)}
.bk-total{background:var(--bg2);border-radius:var(--r2);padding:14px;margin-bottom:14px}
.bk-row{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:7px}
.bk-row.bold{font-weight:700;color:var(--dark);font-size:14px;border-top:1px solid var(--brd);padding-top:7px;margin-top:3px;margin-bottom:0}
.bk-book{width:100%;padding:13px;background:var(--blue);color:#fff;border-radius:var(--r2);font-size:14px;font-weight:700;margin-bottom:9px;transition:background .15s}
.bk-book:hover{background:var(--blue-d)}
.bk-msg{width:100%;padding:11px;background:#fff;color:var(--dark);border:1.5px solid var(--brd);border-radius:var(--r2);font-size:13px;font-weight:600;transition:border-color .15s}
.bk-msg:hover{border-color:var(--dark)}
.post-wrap{max-width:720px;margin:0 auto;padding:36px 24px}
.post-hd h1{font-size:28px;font-weight:800;margin-bottom:6px}
.post-hd p{font-size:14px;color:var(--t2);margin-bottom:28px}
.pcard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:28px;margin-bottom:20px}
.pcard-ttl{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--dark);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--brd)}
.fg{margin-bottom:16px}
.fg label{font-size:12px;font-weight:600;color:var(--t2);display:block;margin-bottom:5px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1.5px solid var(--brd);border-radius:var(--r2);font-size:14px;color:var(--dark);transition:border-color .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:95px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.upload-zone{border:2px dashed var(--brd);border-radius:var(--r);padding:36px 20px;text-align:center;cursor:pointer;transition:all .15s}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-l)}
.upload-zone p{font-size:14px;color:var(--t2);margin-top:8px}
.upload-zone small{font-size:12px;color:var(--t3)}
.pub-btn{width:100%;padding:15px;background:var(--blue);color:#fff;border-radius:var(--r2);font-size:15px;font-weight:700;transition:background .15s}
.pub-btn:hover{background:var(--blue-d)}
.dash-wrap{max-width:1280px;margin:0 auto;padding:28px 24px;display:grid;grid-template-columns:230px 1fr;gap:26px;align-items:start}
.sidebar{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;position:sticky;top:76px}
.sb-top{padding:22px;text-align:center;background:linear-gradient(135deg,var(--dark),var(--dark2))}
.sb-av{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--green));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;color:#fff;font-size:22px;margin:0 auto 10px;border:3px solid rgba(255,255,255,.2)}
.sb-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:#fff}
.sb-uni{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.sb-nav{padding:10px 0}
.sb-nav button{display:flex;align-items:center;gap:10px;width:100%;padding:10px 18px;font-size:13px;font-weight:500;color:var(--t2);background:none;text-align:left;transition:all .15s}
.sb-nav button:hover,.sb-nav button.on{background:var(--blue-l);color:var(--blue)}
.sb-nav button.on{font-weight:700}
.sb-ico{font-size:17px;width:20px;text-align:center}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
.scard{background:#fff;border-radius:var(--r);box-shadow:var(--sh);padding:18px}
.scard-lbl{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:7px}
.scard-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--dark)}
.scard-chg{font-size:11px;margin-top:4px}
.chg-up{color:var(--green)}
.sec-hd2{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sec-hd2 h2{font-size:17px;font-weight:800;color:var(--dark)}
.sec-hd2 a{font-size:12px;color:var(--blue);font-weight:600;cursor:pointer}
.tbl{background:#fff;border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:26px}
.tbl table{width:100%;border-collapse:collapse}
.tbl th{background:var(--bg2);font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;padding:11px 15px;text-align:left}
.tbl td{padding:13px 15px;font-size:13px;color:var(--t2);border-top:1px solid var(--brd)}
.tbl tr:hover td{background:var(--bg2)}
.badge{display:inline-block;padding:3px 9px;border-radius:50px;font-size:10px;font-weight:700}
.b-green{background:#DCFCE7;color:#16A34A}
.b-yellow{background:#FEF9C3;color:#CA8A04}
.b-purple{background:#E0E7FF;color:#4F46E5}

// ACTIONS
function heroSearch(){var v=document.getElementById('hs-input').value.trim();S.bSearch=v;go('browse');}
function browseSearch(){var v=document.getElementById('bs-input').value.trim();S.bSearch=v;render();}
function browseByCategory(cat){S.bSearch=cat;go('browse');}
function filterCat(){
  var checked=['Electronics','Books','Sports','Furniture','Tools','Calculators','Photography','Music'].filter(function(c){var el=document.getElementById('fc-'+c);return el&&el.checked;});
  S.bSearch=checked.length?checked[0]:'';render();
}
function setDashTab(tab){S.dashTab=tab;render();window.scrollTo(0,0);}
function toggleFav(e,id){
  e.stopPropagation();
  S.favs[id]=!S.favs[id];
  e.target.textContent=S.favs[id]?'❤️':'🤍';
  toast(S.favs[id]?'Added to wishlist!':'Removed from wishlist',S.favs[id]?'❤️':'🤍');
}
function calcTotal(price){
  var s=document.getElementById('bk-s').value;
  var e=document.getElementById('bk-e').value;
  if(!s||!e)return;
  var days=Math.ceil((new Date(e)-new Date(s))/86400000);
  if(days<=0){toast('End date must be after start date','⚠️');return;}
  var total=days*price;
  document.getElementById('bk-days-row').innerHTML='<span>₹'+price+' × '+days+' day'+(days>1?'s':'')+'</span><span>₹'+total+'</span>';
  document.getElementById('bk-tot-val').textContent='₹'+total;
  document.getElementById('bk-total').style.display='block';
}
function doBook(){
  var s=document.getElementById('bk-s');
  var e=document.getElementById('bk-e');
  if(!s||!e||!s.value||!e.value){toast('Please select rental dates first','⚠️');return;}
  toast('🎉 Booking confirmed! Check your dashboard.','✅');
  setTimeout(function(){go('dashboard');},1400);
}
function publishListing(){
  toast('🎉 Listing published successfully!','✅');
  setTimeout(function(){go('browse');},1400);
}
function switchConvo(idx){
  S.activeConvo=idx;
  S.convos[idx].unread=false;
  render();
  setTimeout(function(){var b=document.getElementById('chat-body');if(b)b.scrollTop=b.scrollHeight;},50);
}
function sendMsg(){
  var inp=document.getElementById('msg-in');
  var text=inp.value.trim();
  if(!text)return;
  S.convos[S.activeConvo].msgs.push({me:true,text:text,time:'Just now'});
  render();
  setTimeout(function(){
    var body=document.getElementById('chat-body');
    if(body)body.scrollTop=body.scrollHeight;
    setTimeout(function(){
      S.convos[S.activeConvo].msgs.push({me:false,text:"Thanks! I'll get back to you soon 👍",time:'Just now'});
      render();
      setTimeout(function(){var b=document.getElementById('chat-body');if(b)b.scrollTop=b.scrollHeight;},30);
    },1200);
  },30);
}
function toast(msg,icon){
  var el=document.getElementById('toast');
  el.textContent=(icon||'ℹ️')+' '+msg;
  el.classList.add('show');
  clearTimeout(window._tt);
  window._tt=setTimeout(function(){el.classList.remove('show');},2800);
}

// INIT
render();
document.getElementById('nb-home').classList.add('active');
</script>
